name: Build and Release Go Binaries (Linux, Windows)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g., v1.0.0)'
        required: true
      release_notes:
        description: 'Release notes or changelog for this version'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment variables
        run: echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      - name: Build binaries in Docker
        run: |
          BUILD_TIME=$(date -u '+%Y%m%d%H%M%S')
          GIT_COMMIT=$(git rev-parse --short HEAD)
          
          echo "Building with:"
          echo "  Version: ${{ env.VERSION }}"
          echo "  Build: $BUILD_TIME"
          echo "  Git Commit: $GIT_COMMIT"
          
          LDFLAGS="-w -s -X 'main.version=${{ env.VERSION }}' -X 'main.buildTime=${BUILD_TIME}' -X 'main.gitCommit=${GIT_COMMIT}'"
          echo "LDFLAGS: $LDFLAGS"
          
          docker run --rm \
            -v $(pwd)/TGRSSBot:/go/src/app \
            -w /go/src/app \
            golang:bullseye /bin/bash -c "
              set -e
              apt-get update && apt-get install -y --no-install-recommends \
                git ca-certificates zip \
                gcc g++ \
                gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
                gcc-mingw-w64-x86-64 \
                gcc-mingw-w64-i686 \
              && apt-get clean
              
              mkdir -p dist
              
              # Linux builds (CGO enabled)
              CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC=gcc go build -o dist/TGBot_RSS-linux-amd64 -ldflags='$LDFLAGS' *.go
              CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -o dist/TGBot_RSS-linux-arm64 -ldflags='$LDFLAGS' *.go
              CGO_ENABLED=1 GOOS=linux GOARCH=arm GOARM=7 CC=arm-linux-gnueabihf-gcc go build -o dist/TGBot_RSS-linux-armv7 -ldflags='$LDFLAGS' *.go
              
              # Windows builds (CGO enabled with MinGW)
              CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build -o dist/TGBot_RSS-windows-amd64.exe -ldflags='$LDFLAGS' *.go
              CGO_ENABLED=1 GOOS=windows GOARCH=386 CC=i686-w64-mingw32-gcc go build -o dist/TGBot_RSS-windows-386.exe -ldflags='$LDFLAGS' *.go
              
              chown -R $(id -u):$(id -g) dist
            "

      - name: Package binaries with config.json
        run: |
          cp TGRSSBot/config.json TGRSSBot/dist/
          cd TGRSSBot/dist
          
          # Linux archives
          HW_ARCH="amd64 arm64 armv7"
          for ARCH in $HW_ARCH; do
            mv "TGBot_RSS-linux-${ARCH}" "TGBot_RSS-${{ env.VERSION }}-linux-${ARCH}"
            tar -czvf "TGBot_RSS-${{ env.VERSION }}-linux-${ARCH}.tar.gz" "TGBot_RSS-${{ env.VERSION }}-linux-${ARCH}" config.json
            rm "TGBot_RSS-${{ env.VERSION }}-linux-${ARCH}"
          done
          
          # Windows archives
          HW_ARCH_WIN="amd64 386"
          for ARCH in $HW_ARCH_WIN; do
            mv "TGBot_RSS-windows-${ARCH}.exe" "TGBot_RSS-${{ env.VERSION }}-windows-${ARCH}.exe"
            zip "TGBot_RSS-${{ env.VERSION }}-windows-${ARCH}.zip" "TGBot_RSS-${{ env.VERSION }}-windows-${ARCH}.exe" config.json
            rm "TGBot_RSS-${{ env.VERSION }}-windows-${ARCH}.exe"
          done
          
          rm config.json

      - name: Generate checksums
        run: |
          cd TGRSSBot/dist
          sha256sum * > TGBot_RSS_${{ env.VERSION }}_Checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            TGRSSBot/dist/TGBot_RSS-${{ env.VERSION }}-linux-amd64.tar.gz
            TGRSSBot/dist/TGBot_RSS-${{ env.VERSION }}-linux-arm64.tar.gz
            TGRSSBot/dist/TGBot_RSS-${{ env.VERSION }}-linux-armv7.tar.gz
            TGRSSBot/dist/TGBot_RSS-${{ env.VERSION }}-windows-amd64.zip
            TGRSSBot/dist/TGBot_RSS-${{ env.VERSION }}-windows-386.zip
            TGRSSBot/dist/TGBot_RSS_${{ env.VERSION }}_checksums.sha256
          body: ${{ github.event.inputs.release_notes }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}